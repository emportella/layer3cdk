version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-minor-days: 7
      semver-patch-days: 3
      include:
        - '*'
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      include:
        - '*'
    groups:
      actions:
        patterns:
          - '*'
