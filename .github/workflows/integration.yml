name: Integration

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run test:cov
